<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Silent Glory Control Panel</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #0b0e14; color: #e1e7f0; text-align: center; padding: 40px; }
        .container { background: #121824; border: 1px solid #1e293b; padding: 40px; border-radius: 12px; display: inline-block; width: 450px; box-shadow: 0 8px 32px rgba(0,0,0,0.4); }
        h2 { color: #00e676; margin-bottom: 25px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 12px; color: #94a3b8; margin-bottom: 6px; font-weight: bold; letter-spacing: 0.5px; }
        input[type="text"], input[type="file"] { width: 100%; box-sizing: border-box; padding: 12px; background: #1e293b; border: 1px solid #334155; border-radius: 6px; color: #fff; font-size: 14px; }
        button { width: 100%; margin-top: 20px; padding: 14px; background: #00e676; color: #0f172a; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; font-size: 15px; text-transform: uppercase; }
        button:hover { background: #00c862; }
    </style>
</head>
<body>

    <div class="container">
        <h2>Silent Glory Panel</h2>
        
        <div class="form-group">
            <label>TARGET GUILD ID</label>
            <input type="text" id="guildId" placeholder="Enter Free Fire Guild ID">
        </div>
        
        <div class="form-group">
            <label>GUEST ACCOUNT 1 (.DAT)</label>
            <input type="file" id="file1">
        </div>
        
        <div class="form-group">
            <label>GUEST ACCOUNT 2 (.DAT)</label>
            <input type="file" id="file2">
        </div>
        
        <button onclick="startProcessing()">Deploy Silent Bot</button>
    </div>

    <script>
        async function readJsonFile(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    try {
                        const parsed = JSON.parse(e.target.result);
                        resolve(parsed.guest_account_info);
                    } catch(err) {
                        reject("Invalid JSON layout inside file.");
                    }
                };
                reader.readAsText(file);
            });
        }

        async function startProcessing() {
            const guildId = document.getElementById('guildId').value;
            const f1 = document.getElementById('file1').files[0];
            const f2 = document.getElementById('file2').files[0];

            if(!guildId || !f1 || !f2) {
                alert("All input parameters and both file objects are mandatory!");
                return;
            }

            try {
                const acc1 = await readJsonFile(f1);
                const acc2 = await readJsonFile(f2);

                // This triggers the GitHub API action handler
                const response = await fetch('https://api.github.com/repos/YOUR_GITHUB_USERNAME/YOUR_REPO_NAME/dispatches', {
                    method: 'POST',
                    headers: {
                        'Authorization': 'Bearer YOUR_PERSONAL_ACCESS_TOKEN',
                        'Accept': 'application/vnd.github.v3+json',
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        event_type: "activate_bot",
                        client_payload: {
                            guild_id: guildId,
                            uid1: acc1["com.garena.msdk.guest_uid"],
                            pass1: acc1["com.garena.msdk.guest_password"],
                            uid2: acc2["com.garena.msdk.guest_uid"],
                            pass2: acc2["com.garena.msdk.guest_password"]
                        }
                    })
                });

                alert("Tokens parsed successfully! Cloud VM dispatched.");
            } catch(e) {
                alert("Error parsing file structure: " + e);
            }
        }
    </script>
</body>
</html>
